<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vietnam Economic Decision Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
        :root {
            --bg: #fdfcf0; --card: #fffcf5; --ink: #2c1e14;
            --red: #8b0000; --gold: #d4af37; --line: #e2dcc8;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); font-family: "Palatino Linotype", serif; color: var(--ink); }

        .header { padding: 30px 34px; background: linear-gradient(135deg, #5c0000, #8b0000); color: #fff; border-bottom: 5px solid var(--gold); }
        .header h1 { margin: 0; font-size: 28px; text-transform: uppercase; letter-spacing: 1px; }

        .wrap { padding: 25px 28px; max-width: 1520px; margin: auto; }

        /* --- CUSTOM MULTI-SELECT DROPDOWN CSS --- */
        .filters { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        
        .filter-group { display: flex; flex-direction: column; gap: 8px; position: relative; }
        .filter-group label { font-weight: bold; font-size: 12px; color: var(--red); text-transform: uppercase; }

        .multiselect {
            background: white; border: 1px solid var(--line); border-radius: 4px;
            padding: 10px; cursor: pointer; font-size: 14px; position: relative;
            display: flex; justify-content: space-between; align-items: center;
        }
        .multiselect::after { content: '▼'; font-size: 10px; color: var(--gold); }

        .dropdown-content {
            display: none; position: absolute; top: 100%; left: 0; right: 0;
            background: white; border: 1px solid var(--line); border-radius: 0 0 4px 4px;
            z-index: 100; max-height: 250px; overflow-y: auto; box-shadow: var(--shadow);
        }
        .dropdown-content.show { display: block; }
        
        .dropdown-item { padding: 10px; display: flex; align-items: center; gap: 10px; font-size: 13px; border-bottom: 1px solid #f9f9f9; }
        .dropdown-item:hover { background: var(--bg); }
        .dropdown-item input { accent-color: var(--red); cursor: pointer; }

        /* --- LAYOUT & CHARTS --- */
        .kpis { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; margin-bottom: 25px; }
        .kpi { padding: 15px; background: var(--card); border: 1px solid var(--line); border-radius: 4px; text-align: center; }
        .kpi .value { font-size: 24px; font-weight: bold; color: var(--red); }
        .kpi .label { font-size: 10px; text-transform: uppercase; color: #6b7280; margin-top: 5px; }

        .grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--line); padding: 20px; border-radius: 4px; box-shadow: var(--shadow); }
        .wide { grid-column: 1 / -1; }
        .viz { width: 100%; height: 350px; }

        input[type="range"] { accent-color: var(--red); width: 100%; }

        @media (max-width: 1000px) { .grid, .filters, .kpis { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<section class="header">
    <h1>Vietnam Economic Analysis <span style="color: var(--gold)">2021–2026</span></h1>
</section>

<main class="wrap">
    <section class="filters">
        <div class="filter-group">
            <label>Fiscal Years</label>
            <div class="multiselect" onclick="toggleDD('yearDD')">Select Years...</div>
            <div id="yearDD" class="dropdown-content"></div>
        </div>

        <div class="filter-group">
            <label>Industry Sectors</label>
            <div class="multiselect" onclick="toggleDD('sectorDD')">Select Sectors...</div>
            <div id="sectorDD" class="dropdown-content"></div>
        </div>

        <div class="filter-group">
            <label>Tariff Sensitivity: <span id="tariffVal" style="color: var(--red)">15%</span></label>
            <input type="range" id="tariff" min="0" max="45" value="15">
        </div>
    </section>

    <section class="kpis" id="kpis"></section>

    <section class="grid">
        <div class="card">
            <h3>Macroeconomic Pulse</h3>
            <div id="macroChart" class="viz"></div>
        </div>
        <div class="card">
            <h3>Sector Contribution (%)</h3>
            <div id="sectorChart" class="viz"></div>
        </div>
        <div class="card wide">
            <h3>FDI & Trade Flow Analysis</h3>
            <div id="tradeChart" class="viz"></div>
        </div>
    </section>
</main>

<script>
const years = [2021, 2022, 2023, 2024, 2025, 2026];
const macroData = [
    {year: 2021, gdp: 2.6, inf: 1.8}, {year: 2022, gdp: 8.1, inf: 3.2},
    {year: 2023, gdp: 5.1, inf: 3.3}, {year: 2024, gdp: 7.1, inf: 3.6},
    {year: 2025, gdp: 8.0, inf: 3.3}, {year: 2026, gdp: 7.1, inf: 4.9}
];
const sectorData = [
    {name: 'Manufacturing', share: 24.5}, {name: 'Electronics', share: 18.8},
    {name: 'Agriculture', share: 10.9}, {name: 'Retail', share: 10.8},
    {name: 'Real Estate', share: 7.6}, {name: 'Construction', share: 6.4}
];

let activeYears = new Set(years);
let activeSectors = new Set(sectorData.map(s => s.name));

function toggleDD(id) {
    document.getElementById(id).classList.toggle('show');
}

// Close dropdowns if clicking outside
window.onclick = function(event) {
    if (!event.target.matches('.multiselect') && !event.target.closest('.dropdown-content')) {
        document.querySelectorAll('.dropdown-content').forEach(dd => dd.classList.remove('show'));
    }
}

function initFilters() {
    const yDD = document.getElementById('yearDD');
    yDD.innerHTML = years.map(y => `
        <div class="dropdown-item">
            <input type="checkbox" checked value="${y}" onchange="updateFilters('year', this)"> ${y}
        </div>`).join('');

    const sDD = document.getElementById('sectorDD');
    sDD.innerHTML = sectorData.map(s => `
        <div class="dropdown-item">
            <input type="checkbox" checked value="${s.name}" onchange="updateFilters('sector', this)"> ${s.name}
        </div>`).join('');

    document.getElementById('tariff').oninput = (e) => {
        document.getElementById('tariffVal').innerText = e.target.value + '%';
        updateAll();
    };
}

function updateFilters(type, el) {
    if(type === 'year') {
        el.checked ? activeYears.add(parseInt(el.value)) : activeYears.delete(parseInt(el.value));
    } else {
        el.checked ? activeSectors.add(el.value) : activeSectors.delete(el.value);
    }
    updateAll();
}

function updateAll() {
    const m = macroData.filter(d => activeYears.has(d.year));
    const s = sectorData.filter(d => activeSectors.has(d.name));

    // KPIs
    const avgG = m.length ? (m.reduce((a,b)=>a+b.gdp, 0)/m.length).toFixed(1) : 0;
    document.getElementById('kpis').innerHTML = `
        <div class="kpi"><div class="value">${avgG}%</div><div class="label">Avg Growth</div></div>
        <div class="kpi"><div class="value">${m.length}</div><div class="label">Years Active</div></div>
        <div class="kpi"><div class="value">${s.length}</div><div class="label">Sectors</div></div>
        <div class="kpi"><div class="value">High</div><div class="label">FDI Inflow</div></div>
        <div class="kpi"><div class="value">Stable</div><div class="label">VND Outlook</div></div>
        <div class="kpi"><div class="value">Active</div><div class="label">Trade Hub</div></div>
    `;

    // Charts
    Plotly.react('macroChart', [
        { x: m.map(d=>d.year), y: m.map(d=>d.gdp), name: 'GDP %', type: 'scatter', line: {color: '#8b0000', width: 3} },
        { x: m.map(d=>d.year), y: m.map(d=>d.inf), name: 'Inflation %', type: 'bar', marker: {color: '#d4af37', opacity: 0.7} }
    ], { margin: {t:30, l:40, r:10, b:40}, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)' });

    Plotly.react('sectorChart', [{
        values: s.map(d=>d.share), labels: s.map(d=>d.name), type: 'pie',
        marker: { colors: ['#8b0000', '#d4af37', '#2c1e14', '#5c0000', '#a68a3c', '#4d3b2e'] },
        hole: 0.4
    }], { margin: {t:0, l:0, r:0, b:0}, paper_bgcolor: 'rgba(0,0,0,0)' });
}

initFilters();
updateAll();
</script>

</body>
</html>
