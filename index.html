<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vietnam Economic Decision Dashboard: Strategic Analysis</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .recharts-cartesian-grid-horizontal line, .recharts-cartesian-grid-vertical line { stroke: #e2e8f0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        const { 
            LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, 
            Tooltip, Legend, ResponsiveContainer, Cell, AreaChart, Area 
        } = Recharts;

        // --- UNIFIED DATA ARRAY (2021-2026) ---
        const DATA = [
            { year: 2021, gdp: 366, growth: 2.58, fdiReg: 31.1, fdiDisb: 19.7, exports: 336, inflation: 1.84, credit: 115 },
            { year: 2022, gdp: 408, growth: 8.02, fdiReg: 27.7, fdiDisb: 22.4, exports: 371, inflation: 3.15, credit: 121 },
            { year: 2023, gdp: 430, growth: 5.05, fdiReg: 36.6, fdiDisb: 23.1, exports: 355, inflation: 3.25, credit: 126 },
            { year: 2024, gdp: 465, growth: 6.10, fdiReg: 38.0, fdiDisb: 25.0, exports: 420, inflation: 3.80, credit: 131 },
            { year: 2025, gdp: 514, growth: 8.02, fdiReg: 38.4, fdiDisb: 27.6, exports: 475, inflation: 3.31, credit: 135 },
            { year: "2026*", gdp: 548, growth: 6.80, fdiReg: 40.0, fdiDisb: 25.6, exports: 499, inflation: 4.20, credit: 138 }
        ];

        function Dashboard() {
            const [selectedYear, setSelectedYear] = useState(null);
            
            const filteredData = useMemo(() => {
                return selectedYear ? DATA.filter(d => d.year === selectedYear) : DATA;
            }, [selectedYear]);

            const current = selectedYear ? filteredData[0] : DATA.find(d => d.year === 2025);

            // Decision Logic: Market Readiness Score
            const readinessScore = useMemo(() => {
                let score = 0;
                if (current.growth > 6) score += 30;
                if (current.inflation < 4) score += 30;
                if (current.fdiDisb > 25) score += 20;
                if (current.credit < 140) score += 20;
                return score;
            }, [current]);

            return (
                <div className="max-w-7xl mx-auto p-6 space-y-6">
                    {/* Header */}
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <h1 className="text-2xl font-bold text-slate-800">Vietnam Economic Decision Dashboard</h1>
                        <p className="text-slate-500 italic text-sm">EMBA Market Entry Decision Support · Strategic Analysis 2021-2026</p>
                    </div>

                    {/* KPI Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-5 gap-4">
                        {[
                            { label: "GDP Growth", val: current.growth + "%", sub: "Actual/Forecast" },
                            { label: "Nominal GDP", val: "$" + current.gdp + "B", sub: "USD Billions" },
                            { label: "FDI Disbursed", val: "$" + current.fdiDisb + "B", sub: "Realized Capital" },
                            { label: "Exports", val: "$" + current.exports + "B", sub: "Trade Volume" },
                            { label: "Readiness Score", val: readinessScore + "/100", sub: "Market Entry Score" }
                        ].map((kpi, i) => (
                            <div key={i} className="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                                <p className="text-xs font-semibold text-slate-500 uppercase">{kpi.label}</p>
                                <p className="text-xl font-bold text-blue-600">{kpi.val}</p>
                                <p className="text-[10px] text-slate-400">{kpi.sub}</p>
                            </div>
                        ))}
                    </div>

                    {/* Year Selector */}
                    <div className="flex gap-2 bg-slate-100 p-2 rounded-lg w-fit">
                        {DATA.map(d => (
                            <button 
                                key={d.year}
                                onClick={() => setSelectedYear(selectedYear === d.year ? null : d.year)}
                                className={`px-4 py-1 rounded text-sm font-medium transition-all ${selectedYear === d.year ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-800'}`}
                            >
                                {d.year}
                            </button>
                        ))}
                    </div>

                    {/* Charts Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {/* Macro Pulse */}
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 h-80">
                            <h3 className="font-bold text-slate-700 mb-4 text-sm uppercase">Macroeconomic Pulse (Growth vs Inflation)</h3>
                            <ResponsiveContainer width="100%" height="100%">
                                <LineChart data={DATA}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                    <XAxis dataKey="year" fontSize={12} />
                                    <YAxis fontSize={12} />
                                    <Tooltip />
                                    <Legend />
                                    <Line type="monotone" dataKey="growth" stroke="#2563eb" strokeWidth={3} name="GDP Growth %" />
                                    <Line type="monotone" dataKey="inflation" stroke="#f59e0b" strokeWidth={2} name="Inflation %" />
                                </LineChart>
                            </ResponsiveContainer>
                        </div>

                        {/* FDI Analysis */}
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 h-80">
                            <h3 className="font-bold text-slate-700 mb-4 text-sm uppercase">FDI Gap Analysis (USD Billion)</h3>
                            <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={DATA}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                    <XAxis dataKey="year" fontSize={12} />
                                    <YAxis fontSize={12} />
                                    <Tooltip />
                                    <Bar dataKey="fdiReg" fill="#cbd5e1" name="Registered (Intent)" />
                                    <Bar dataKey="fdiDisb" fill="#2563eb" name="Disbursed (Realized)" />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                    </div>

                    <div className="text-center text-slate-400 text-[10px] pb-10 uppercase tracking-widest">
                        Sources: NSO Vietnam (2026 Release) · IMF WEO · EMBA Research 2025
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
