<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vietnam Economic Decision Dashboard: Strategic Analysis</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        const { 
            LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, 
            Tooltip, Legend, ResponsiveContainer, Cell 
        } = Recharts;

        // --- THE UNIFIED DATA ARRAY (2021-2026) ---
        const DATA = [
            { year: 2021, gdp: 366, growth: 2.58, fdiReg: 31.1, fdiDisb: 19.7, exports: 336, inflation: 1.84 },
            { year: 2022, gdp: 408, growth: 8.02, fdiReg: 27.7, fdiDisb: 22.4, exports: 371, inflation: 3.15 },
            { year: 2023, gdp: 430, growth: 5.05, fdiReg: 36.6, fdiDisb: 23.1, exports: 355, inflation: 3.25 },
            { year: 2024, gdp: 465, growth: 6.10, fdiReg: 38.0, fdiDisb: 25.0, exports: 420, inflation: 3.80 },
            { year: 2025, gdp: 514, growth: 8.02, fdiReg: 38.4, fdiDisb: 27.6, exports: 475, inflation: 3.31 },
            { year: "2026*", gdp: 548, growth: 6.80, fdiReg: 40.0, fdiDisb: 25.6, exports: 499, inflation: 4.20 }
        ];

        function Dashboard() {
            const [selectedYear, setSelectedYear] = useState(null);
            
            const filteredData = useMemo(() => {
                return selectedYear ? DATA.filter(d => d.year === selectedYear) : DATA;
            }, [selectedYear]);

            const current = selectedYear ? filteredData[0] : DATA.find(d => d.year === 2025);

            // Calculation for EMBA Market Readiness Score
            const readinessScore = useMemo(() => {
                let score = 0;
                if (current.growth > 6) score += 40;
                if (current.inflation < 4) score += 30;
                if (current.fdiDisb > 25) score += 30;
                return score;
            }, [current]);

            return (
                <div className="max-w-7xl mx-auto p-8 space-y-8">
                    <header className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h1 className="text-3xl font-extrabold text-slate-900">Vietnam Economic Decision Dashboard</h1>
                        <p className="text-slate-500 font-medium">Strategic Analysis 2021-2026 | Decision Support Tool</p>
                    </header>

                    {/* KPI CARDS */}
                    <div className="grid grid-cols-1 md:grid-cols-5 gap-4">
                        {[
                            { label: "GDP Growth", val: current.growth + "%" },
                            { label: "Nominal GDP", val: "$" + current.gdp + "B" },
                            { label: "FDI Disbursed", val: "$" + current.fdiDisb + "B" },
                            { label: "Total Exports", val: "$" + current.exports + "B" },
                            { label: "Market Score", val: readinessScore + "/100" }
                        ].map((kpi, i) => (
                            <div key={i} className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                                <p className="text-xs font-bold text-slate-400 uppercase mb-1">{kpi.label}</p>
                                <p className="text-2xl font-black text-blue-600">{kpi.val}</p>
                            </div>
                        ))}
                    </div>

                    {/* INTERACTIVE YEAR FILTER */}
                    <div className="flex bg-slate-200 p-1.5 rounded-xl w-fit space-x-1">
                        {DATA.map(d => (
                            <button 
                                key={d.year}
                                onClick={() => setSelectedYear(selectedYear === d.year ? null : d.year)}
                                className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${selectedYear === d.year ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:bg-slate-100'}`}
                            >
                                {d.year}
                            </button>
                        ))}
                    </div>

                    {/* CHARTS */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 h-96">
                            <h3 className="font-bold text-slate-800 mb-6 uppercase text-sm tracking-widest">Macroeconomic Pulse</h3>
                            <ResponsiveContainer width="100%" height="100%">
                                <LineChart data={DATA}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                    <XAxis dataKey="year" fontSize={12} />
                                    <YAxis fontSize={12} />
                                    <Tooltip />
                                    <Line type="monotone" dataKey="growth" stroke="#2563eb" strokeWidth={4} name="Growth %" />
                                    <Line type="monotone" dataKey="inflation" stroke="#f59e0b" strokeWidth={3} name="Inflation %" />
                                </LineChart>
                            </ResponsiveContainer>
                        </div>

                        <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 h-96">
                            <h3 className="font-bold text-slate-800 mb-6 uppercase text-sm tracking-widest">FDI Gap (Realization)</h3>
                            <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={DATA}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                    <XAxis dataKey="year" fontSize={12} />
                                    <YAxis fontSize={12} />
                                    <Tooltip />
                                    <Bar dataKey="fdiReg" fill="#cbd5e1" name="Registered" />
                                    <Bar dataKey="fdiDisb" fill="#2563eb" name="Disbursed" />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
