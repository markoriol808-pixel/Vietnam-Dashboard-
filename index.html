// ── Market Readiness Score algorithm ──────────────────────
function calcReadinessScore(filtered) {
  if (!filtered.length) return 0;
  const avgGrowth = filtered.reduce((s,d)=>s+d.GDP_Growth,0)/filtered.length;
  const avgInf    = filtered.reduce((s,d)=>s+d.Inflation,0)/filtered.length;
  const avgFDI    = filtered.reduce((s,d)=>s+d.FDI_Disbursed,0)/filtered.length;
  const avgExp    = filtered.reduce((s,d)=>s+d.Export_Value,0)/filtered.length;
  const avgC2GDP  = filtered.reduce((s,d)=>s+d.Credit_to_GDP,0)/filtered.length;
  let score = 0;
  // GDP Growth signal (max 25)
  score += Math.min(25, (avgGrowth / 10) * 25);
  // Inflation control (max 20 — lower = better)
  score += avgInf < 2 ? 20 : avgInf < 3.5 ? 16 : avgInf < 5 ? 10 : 4;
  // FDI momentum (max 20)
  score += Math.min(20, (avgFDI / 8) * 20);
  // Export strength (max 20)
  score += Math.min(20, (avgExp / 60) * 20);
  // Credit health (max 15 — 120-140% optimal)
  score += (avgC2GDP >= 115 && avgC2GDP <= 140) ? 15 : (avgC2GDP < 115) ? 8 : 6;
  return Math.round(Math.min(100, score));
}

const REGION_COLORS = { "Northern":"#DA251D","Central":"#c9a000","Southern":"#2d7a2d" };

function scoreColor(s) {
  if (s >= 75) return "#2d7a2d";
  if (s >= 55) return "#c9a000";
  return "#DA251D";
}

// ── Custom Tooltip ────────────────────────────────────────

  if (!active || !payload?.length) return null;
  return (
    <div style={{background:"#1a0800",border:"1px solid #c9a000",borderRadius:4,padding:"10px 14px",fontFamily:"'Libre Baskerville',serif"}}>

// ════════════════════════════════════════════════════════════
// MAIN DASHBOARD COMPONENT
// ════════════════════════════════════════════════════════════
export default function Dashboard() {
  const [selYears,   setSelYears]   = useState(new Set(ALL_YEARS));
  const [selSectors, setSelSectors] = useState(new Set(ALL_SECTORS));
  const [selRegions, setSelRegions] = useState(new Set(ALL_REGIONS));
  const [snapYear,   setSnapYear]   = useState(null);
  const [openDD,     setOpenDD]     = useState(null); // "sector"|"region"|null

  // ── CORE FILTER FUNCTION ─────────────────────────────────
  const filtered = useMemo(() => {
    const years   = snapYear ? new Set([snapYear]) : selYears;
    return RAW_DATA.filter(d =>
      years.has(d.Year) &&
      selSectors.has(d.Sector) &&
      selRegions.has(d.Region)
    );
  }, [selYears, selSectors, selRegions, snapYear]);

  // ── KEY INDICATORS ──────────────────────────────────────
  const kpis = useMemo(() => {
    if (!filtered.length) return {};
    const byYear = {};
    filtered.forEach(d => {
      if (!byYear[d.Year]) byYear[d.Year] = [];
      byYear[d.Year].push(d);
    });
    const years = Object.keys(byYear).map(Number).sort();
    const latest = byYear[years[years.length-1]] || [];
    const avgGrowth  = +(latest.reduce((s,d)=>s+d.GDP_Growth,0)/latest.length).toFixed(2);
    const nomGDP     = latest[0]?.GDP_Value ?? 0;
    const gdpCap     = latest[0]?.GDP_Per_Capita ?? 0;
    const fdiDisb    = +latest.reduce((s,d)=>s+d.FDI_Disbursed,0).toFixed(1);
    const exports    = +latest.reduce((s,d)=>s+d.Export_Value,0).toFixed(1);
    const inflation  = +(latest.reduce((s,d)=>s+d.Inflation,0)/latest.length).toFixed(2);
    const isForecast = latest[0]?.isForecast ?? false;
    return { avgGrowth, nomGDP, gdpCap, fdiDisb, exports, inflation, isForecast };
  }, [filtered]);

  const readiness = useMemo(() => calcReadinessScore(filtered), [filtered]);

  // ── MACRO CHART DATA ─────────────────────────────────────
  const macroChartData = useMemo(() => {
    const byYear = {};
    filtered.forEach(d => {
      if (!byYear[d.Year]) byYear[d.Year] = { year:d.Year, GDP_Growth:d.GDP_Growth, Inflation:d.Inflation, isForecast:d.isForecast, fdi:0 };
      byYear[d.Year].fdi += d.FDI_Disbursed;
    });
    return Object.values(byYear).sort((a,b)=>a.year-b.year);
  }, [filtered]);

  // ── FDI GAP DATA ─────────────────────────────────────────
  const fdiChartData = useMemo(() => {
    const byYear = {};
    filtered.forEach(d => {
      if (!byYear[d.Year]) byYear[d.Year] = { year:d.Year, Registered:0, Disbursed:0, isForecast:d.isForecast };
      byYear[d.Year].Registered += d.FDI_Registered;
      byYear[d.Year].Disbursed  += d.FDI_Disbursed;
    });
    return Object.values(byYear).sort((a,b)=>a.year-b.year).map(d=>({
      ...d, Gap:+(d.Registered-d.Disbursed).toFixed(2),
      Registered:+d.Registered.toFixed(2), Disbursed:+d.Disbursed.toFixed(2)
    }));
  }, [filtered]);

  // ── CREDIT/GDP DATA ──────────────────────────────────────
  const creditData = useMemo(() => {
    const byYear = {};
    filtered.forEach(d => { byYear[d.Year] = { year:d.Year, Ratio:d.Credit_to_GDP, isForecast:d.isForecast }; });
    return Object.values(byYear).sort((a,b)=>a.year-b.year);
  }, [filtered]);

  // ── PEER DATA ────────────────────────────────────────────
  const peerChartData = useMemo(() => {
    const years = [...new Set(filtered.map(d=>d.Year))].sort();
    return years.map(y=>({
      year:y,
      ...Object.fromEntries(PEER_DATA.map(p=>[p.country, p.data[y]??null]))
    }));
  }, [filtered]);

  // ── SECTOR TABLE DATA ────────────────────────────────────
  const sectorTableData = useMemo(() => {
    const bySec = {};

      if (!bySec[d.Sector]) bySec[d.Sector] = { sector:d.Sector, growth:[], fdi:0, exports:0, count:0 };
      bySec[d.Sector].growth.push(d.GDP_Growth);
      bySec[d.Sector].fdi     += d.FDI_Disbursed;
      bySec[d.Sector].exports += d.Export_Value;
      bySec[d.Sector].count++;
    });
    return Object.values(bySec).map(d=>({
      sector:    d.sector,
      avgGrowth: +(d.growth.reduce((a,b)=>a+b,0)/d.growth.length).toFixed(2),
      totalFDI:  +d.fdi.toFixed(1),
      totalExp:  +d.exports.toFixed(1),

        <div style={{position:"relative",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>

                Vietnam Economic Decision Dashboard: <span style={{color:"#FFCD00"}}>Strategic Analysis 2021–2026</span>
              </h1>
            </div>
            <p style={{color:"rgba(255,255,255,0.6)",fontSize:10,letterSpacing:3,textTransform:"uppercase",fontStyle:"italic",margin:0}}>
              Cộng hòa xã hội chủ nghĩa Việt Nam · EMBA Market Entry Decision Support
            </p>
          </div>
          <div style={{textAlign:"right",color:"rgba(255,255,255,0.55)",fontSize:10,lineHeight:1.9,letterSpacing:.5}}>

      <div style={{padding:"20px 28px",maxWidth:1560,margin:"0 auto"}}>

        {/* ── ACTIVE FILTER BANNER ─────────────────────── */}

            <span style={{color:"#9e1a14"}}>

                <Tooltip content={<ChartTooltip/>}/>
                <Legend wrapperStyle={{fontSize:10,fontFamily:"serif"}}/>
                <Bar dataKey="Registered" name="Registered FDI" fill="rgba(158,26,20,0.25)" stroke="#9e1a14" strokeWidth={1} radius={[2,2,0,0]}/>
                <Bar dataKey="Disbursed"  name="Disbursed FDI"  fill="rgba(218,37,29,0.75)" radius={[2,2,0,0]}/>
                <Line type="monotone" dataKey="Gap" name="Reg–Disb Gap" stroke="#4a7ab5" strokeWidth={2} strokeDasharray="4 2" dot={{r:4,fill:"#4a7ab5"}}/>
              </ComposedChart>
            </ResponsiveContainer>
          </div>

          {/* Chart 3: Credit-to-GDP */}
          <div style={{background:"#fff",border:"1px solid #e8e0d4",borderRadius:4,padding:"16px 16px 8px"}}>
            <h3 style={{fontFamily:"'IM Fell English',serif",fontWeight:400,fontSize:15,color:"#1e1208",margin:"0 0 3px"}}>Credit-to-GDP Ratio Trajectory</h3>
            <p style={{fontSize:9,color:"#8a7060",margin:"0 0 12px",paddingBottom:8,borderBottom:"1px solid #f0ebe4"}}>Outstanding credit as % of GDP · 120–140% considered optimal for emerging markets</p>
            <ResponsiveContainer width="100%" height={250}>
              <AreaChart data={creditData} onClick={handleChartClick} style={{cursor:"pointer"}}>
                <defs>
                  <linearGradient id="creditGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="5%"  stopColor="#DA251D" stopOpacity={0.15}/>
                    <stop offset="95%" stopColor="#DA251D" stopOpacity={0.02}/>
                  </linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="3 3" stroke="rgba(0,0,0,0.06)"/>
                <XAxis dataKey="year" tick={{fontSize:10,fontFamily:"serif",fill:"#4a3728"}}/>
                <YAxis domain={[110,145]} tick={{fontSize:10,fontFamily:"serif",fill:"#4a3728"}} label={{value:"%",angle:-90,position:"insideLeft",offset:10,style:{fontSize:9,fill:"#8a7060"}}}/>
                <Tooltip content={<ChartTooltip/>}/>
                <ReferenceLine y={120} stroke="rgba(201,160,0,0.5)" strokeDasharray="4 2" label={{value:"120% floor",position:"insideTopLeft",fontSize:8,fill:"#c9a000"}}/>
                <ReferenceLine y={140} stroke="rgba(218,37,29,0.4)" strokeDasharray="4 2" label={{value:"140% ceiling",position:"insideTopLeft",fontSize:8,fill:"#DA251D"}}/>
                <Area type="monotone" dataKey="Ratio" name="Credit/GDP %" stroke="#DA251D" strokeWidth={2.5} fill="url(#creditGrad)" dot={{r:5,fill:"#DA251D"}}/>
              </AreaChart>
            </ResponsiveContainer>
          </div>

          {/* Chart 4: Peer Comparison */}
          <div style={{background:"#fff",border:"1px solid #e8e0d4",borderRadius:4,padding:"16px 16px 8px"}}>
            <h3 style={{fontFamily:"'IM Fell English',serif",fontWeight:400,fontSize:15,color:"#1e1208",margin:"0 0 3px"}}>Peer Country Growth Comparison</h3>
            <p style={{fontSize:9,color:"#8a7060",margin:"0 0 12px",paddingBottom:8,borderBottom:"1px solid #f0ebe4"}}>Real GDP growth % · SE Asia peers · Source: IMF WEO · 2026 = forecast</p>
            <ResponsiveContainer width="100%" height={250}>
              <LineChart data={peerChartData}>
                <CartesianGrid strokeDasharray="3 3" stroke="rgba(0,0,0,0.06)"/>
                <XAxis dataKey="year" tick={{fontSize:10,fontFamily:"serif",fill:"#4a3728"}}/>
                <YAxis tick={{fontSize:10,fontFamily:"serif",fill:"#4a3728"}} label={{value:"%",angle:-90,position:"insideLeft",offset:10,style:{fontSize:9,fill:"#8a7060"}}}/>
                <Tooltip content={<ChartTooltip/>}/>
                <Legend wrapperStyle={{fontSize:10,fontFamily:"serif"}}/>
                {PEER_DATA.map(p=>(
                  <Line key={p.country} type="monotone" dataKey={p.country}
                    stroke={p.color} strokeWidth={p.country==="Vietnam"?3.5:1.8}
                    dot={{r:p.country==="Vietnam"?6:4,fill:p.color}}
                    strokeDasharray={p.country==="Vietnam"?undefined:"4 2"}/>
                ))}
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* ── BOTTOM ROW: Sector Table + Regional Map ── */}
        <div style={{display:"grid",gridTemplateColumns:"1.2fr 1fr",gap:16,marginBottom:16}}>

          {/* Sector Growth Table */}
          <div style={{background:"#fff",border:"1px solid #e8e0d4",borderRadius:4,padding:"16px"}}>
            <h3 style={{fontFamily:"'IM Fell English',serif",fontWeight:400,fontSize:15,color:"#1e1208",margin:"0 0 3px"}}>Sector Growth Intelligence</h3>
            <p style={{fontSize:9,color:"#8a7060",margin:"0 0 12px",paddingBottom:8,borderBottom:"1px solid #f0ebe4"}}>Click any row to filter the entire dashboard to that sector · Click again to deselect</p>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead>
                <tr>
                  {["Sector","Avg Growth","Total FDI (B)","Exports (B)","Momentum"].map(h=>(
                    <th key={h} style={{fontSize:8,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700,color:"#8a7060",padding:"5px 8px",textAlign:h==="Sector"?"left":"center",borderBottom:"2px solid #e8e0d4"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {sectorTableData.map(row=>{
                  const isSelected = selSectors.size===1 && selSectors.has(row.sector);
                  const isDimmed   = selSectors.size===1 && !selSectors.has(row.sector);
                  return (
                    <tr key={row.sector} onClick={()=>handleSectorRowClick(row.sector)}
                      style={{cursor:"pointer",opacity:isDimmed?0.35:1,
                        background:isSelected?"rgba(218,37,29,0.06)":"transparent",
                        borderLeft:isSelected?"3px solid #DA251D":"3px solid transparent",
                        transition:"all 0.15s"}}>
                      <td style={{padding:"8px 8px",borderBottom:"1px solid #f0ebe4",display:"flex",alignItems:"center",gap:7}}>
                        <span style={{width:8,height:8,borderRadius:"50%",background:SECTOR_COLORS[row.sector],display:"inline-block",flexShrink:0}}/>
                        <span style={{fontWeight:isSelected?700:400}}>{row.sector}</span>
                      </td>
                      <td style={{padding:"8px",borderBottom:"1px solid #f0ebe4",textAlign:"center",fontWeight:700,color:row.avgGrowth>=7?"#2d7a2d":row.avgGrowth>=5?"#c9a000":"#DA251D"}}>
                        {row.avgGrowth}%
                      </td>
                      <td style={{padding:"8px",borderBottom:"1px solid #f0ebe4",textAlign:"center"}}>
                        ${row.totalFDI}
                      </td>
                      <td style={{padding:"8px",borderBottom:"1px solid #f0ebe4",textAlign:"center"}}>
                        ${row.totalExp}
                      </td>
                      <td style={{padding:"8px",borderBottom:"1px solid #f0ebe4",textAlign:"center"}}>
                        <div style={{background:"#f0ebe4",borderRadius:3,height:5,width:60,margin:"0 auto",overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${Math.min(100,(row.avgGrowth/10)*100)}%`,background:row.avgGrowth>=7?"#2d7a2d":row.avgGrowth>=5?"#c9a000":"#DA251D",borderRadius:3}}/>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Regional Map */}
          <div style={{background:"#fff",border:"1px solid #e8e0d4",borderRadius:4,padding:"16px"}}>
            <h3 style={{fontFamily:"'IM Fell English',serif",fontWeight:400,fontSize:15,color:"#1e1208",margin:"0 0 3px"}}>Regional Investment Map</h3>
            <p style={{fontSize:9,color:"#8a7060",margin:"0 0 8px",paddingBottom:8,borderBottom:"1px solid #f0ebe4"}}>Click a region to filter the entire dashboard · Northern/Central/Southern clusters</p>
            {/* Region KPIs */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:10}}>
              {ALL_REGIONS.map(r=>{
                const rData = filtered.filter(d=>d.Region===r);
                const rFDI  = rData.reduce((s,d)=>s+d.FDI_Disbursed,0).toFixed(1);
                const rExp  = rData.reduce((s,d)=>s+d.Export_Value,0).toFixed(1);
                const isAct = selRegions.has(r) && selRegions.size<3;
                return (
                  <div key={r} onClick={()=>handleRegionClick(r)} style={{cursor:"pointer",
                    padding:"8px 6px",borderRadius:3,textAlign:"center",transition:"all 0.15s",
                    background:selRegions.has(r)&&selRegions.size<3?"rgba(218,37,29,0.06)":"#f7f4ee",
                    border:`1px solid ${selRegions.has(r)&&selRegions.size<3?REGION_COLORS[r]:"#e8e0d4"}`,
                    borderTop:`3px solid ${REGION_COLORS[r]}`}}>
                    <div style={{fontSize:10,fontWeight:700,color:REGION_COLORS[r],marginBottom:2}}>{r}</div>
                    <div style={{fontSize:9,color:"#4a3728"}}>FDI: <strong>${rFDI}B</strong></div>
                    <div style={{fontSize:9,color:"#4a3728"}}>Exp: <strong>${rExp}B</strong></div>
                  </div>
                );
              })}
            </div>
            <VietnamMap activeRegions={[...selRegions]} onRegionClick={handleRegionClick}/>
          </div>
        </div>

        {/* ── FOOTER ─────────────────────────────────── */}
        <div style={{textAlign:"center",fontSize:9,color:"#a09080",padding:"12px 0",borderTop:"1px solid #e8e0d4",lineHeight:1.8}}>
          Sources: NSO Vietnam (2026 release) · IMF World Economic Outlook 2025 · Penn Wharton / USITC DataWeb · Vietnam Briefing 2025 · CBRE/Savills Industrial Report 2024 · InCorp Vietnam 2025<br/>
          2025 figures confirmed actuals · 2026 = IMF WEO forecast · All FDI figures in USD billions · Tariff ETR: Penn Wharton / USITC weighted-average effective rates
        </div>
      </div>

      {/* Click outside closes dropdowns */}
      {openDD && <div style={{position:"fixed",inset:0,zIndex:100}} onClick={()=>setOpenDD(null)}/>}
    </div>
  );
}
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
